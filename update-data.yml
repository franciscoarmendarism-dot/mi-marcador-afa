name: Actualizar datos del ascenso argentino

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

concurrency:
  group: afa-scraper
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Bajar el repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium --with-deps

      - name: Correr el scraper
        run: python scrape_afa.py

      - name: Commitear data/afa.json si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/afa.json
          git diff --quiet --cached || git commit -m "Actualizar datos AFA $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
